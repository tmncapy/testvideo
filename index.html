<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

        #myVideo {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            display: none; /* Ẩn video ban đầu */
            object-fit: cover;
        }

        .btn-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="btn-play" onclick="playVideo()">Phát Video</button>

    <video id="myVideo" muted playsinline>
        <source src="700.LowerThird.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ định dạng WebM.
    </video>

    <script>
        function playVideo() {
            var video = document.getElementById("myVideo");
            var btn = document.querySelector(".btn-play");
            
            video.style.display = "block";
            btn.style.display = "none";
            
            // Promise để bắt lỗi nếu video không tự phát được
            var playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Video đã bắt đầu phát thành công
                }).catch(error => {
                    alert("Trình duyệt chặn phát video. Hãy đảm bảo bạn đã tương tác với trang web.");
                });
            }
        }
    </script>
</body>
</html>
