<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            /* Cài đặt hình nền */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #myVideo {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            display: none; /* Ẩn video ban đầu */
            object-fit: cover;
            z-index: 5; /* Đảm bảo video nằm trên nền */
        }

        .btn-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; /* Nút bấm luôn nằm trên cùng */
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="btn-play" onclick="playVideo()">Phát Video</button>

    <video id="myVideo" muted playsinline>
        <source src="output.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ định dạng WebM.
    </video>

    <script>
        function playVideo() {
            var video = document.getElementById("myVideo");
            var btn = document.querySelector(".btn-play");
            
            video.style.display = "block";
            btn.style.display = "none";
            
            video.play().catch(error => {
                console.error("Lỗi phát video:", error);
                alert("Không thể phát video. Vui lòng kiểm tra file output.webm đã cùng thư mục chưa.");
            });
        }
    </script>
</body>
</html>
