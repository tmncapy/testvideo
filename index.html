<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        /* Loại bỏ khoảng trắng mặc định của trình duyệt */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Tránh thanh cuộn xuất hiện */
        }

        #myVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            display: none; /* Ẩn video ban đầu */
            object-fit: cover; /* Giữ tỷ lệ khung hình, lấp đầy màn hình */
        }

        .btn-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="btn-play" onclick="playVideo()">Phát Video Full Size</button>

    <video id="myVideo">
        <source src="700.LowerThird.mov" type="video/quicktime">
        Trình duyệt không hỗ trợ định dạng này.
    </video>

    <script>
        function playVideo() {
            var video = document.getElementById("myVideo");
            var btn = document.querySelector(".btn-play");
            
            video.style.display = "block"; // Hiển thị video
            btn.style.display = "none";    // Ẩn nút sau khi nhấn
            video.play();                  // Phát video
        }
    </script>
</body>
</html>
