<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Video Overlay</title>
<style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

    /* Ảnh nền */
    #bg {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 1;
    }

    /* Video (Lower Third của bạn) */
    #myVideo {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 2; display: none;
    }

    /* Vùng chứa chữ: Căn giữa tuyệt đối trên thanh */
    #text-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 3;
        display: flex;
        justify-content: center; /* Căn giữa ngang */
        align-items: center;     /* Căn giữa dọc */
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
    }

    #text-overlay {
        font-family: sans-serif;
        font-weight: bold;
        color: #ffffff;
        font-size: 3vw; /* Kích thước chữ tự động co giãn theo màn hình */
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        pointer-events: none;
    }

    .btn-play {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999; padding: 20px 40px;
        font-size: 20px; cursor: pointer;
    }
</style>
</head>
<body>

    <img id="bg" src="./bg.png" alt="Background">

    <div id="text-container">
        <div id="text-overlay">Dẫn chương trình Ngọc Huy</div>
    </div>

    <video id="myVideo" muted playsinline preload="auto">
        <source src="./output.webm" type="video/webm">
    </video>

    <button class="btn-play" onclick="playVideo()">Phát Video</button>

<script>
    function playVideo(){
        const video = document.getElementById("myVideo");
        const btn = document.querySelector(".btn-play");
        const container = document.getElementById("text-container");

        video.style.display = "block";
        btn.style.display = "none";
        video.currentTime = 0;
        video.play();

        // Delay 1.5s để hiện text
        setTimeout(() => {
            container.style.opacity = "1";
        }, 1500);
    }

    document.getElementById("myVideo").addEventListener("ended", function(){
        this.style.display = "none";
        document.querySelector(".btn-play").style.display = "block";
        document.getElementById("text-container").style.opacity = "0";
    });
</script>

</body>
</html>
