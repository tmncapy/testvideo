<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Video Overlay</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background-color: black;
}

/* Ảnh nền */
#bg{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
}

/* Video */
#myVideo{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:2;
    display:none;
}

/* Nút phát */
.btn-play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:999;
    padding:20px 40px;
    font-size:20px;
    cursor:pointer;
}

/* Text overlay */
#text-overlay {
    position: absolute;
    bottom: 10%; /* Vị trí text (bạn có thể điều chỉnh tùy ý) */
    left: 5%;
    color: white;
    font-size: 40px;
    font-family: sans-serif;
    z-index: 3;
    opacity: 0; /* Ẩn lúc đầu */
    transition: opacity 0.5s ease-in-out; /* Hiệu ứng mượt */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<img id="bg" src="./bg.png" alt="Background">

<div id="text-overlay">Dẫn chương trình Ngọc Huy</div>

<video id="myVideo" muted playsinline preload="auto">
    <source src="./output.webm" type="video/webm">
</video>

<button class="btn-play" onclick="playVideo()">
    Phát Video
</button>

<script>
function playVideo(){
    const video = document.getElementById("myVideo");
    const btn = document.querySelector(".btn-play");
    const text = document.getElementById("text-overlay");

    video.style.display = "block";
    btn.style.display = "none";
    video.currentTime = 0;

    video.play().catch(err => {
        console.log(err);
    });

    // Delay 1.5s (1500ms) để hiện text
    setTimeout(() => {
        text.style.opacity = "1";
    }, 1500);
}

document.getElementById("myVideo").addEventListener("ended", function(){
    this.style.display = "none";
    document.querySelector(".btn-play").style.display = "block";
    // Ẩn text ngay khi video kết thúc
    document.getElementById("text-overlay").style.opacity = "0";
});
</script>

</body>
</html>
