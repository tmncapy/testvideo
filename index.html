<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Video với Hình nền</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            /* Cài đặt hình nền */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative; /* Đảm bảo con nằm chính xác */
        }

        #myVideo {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            display: none; /* Ẩn video ban đầu */
            object-fit: cover;
            z-index: 5; /* Nằm TRÊN background */
            /* opacity: 0.8; */ /* Thử bật opacity nếu video che quá nhiều */
        }

        .btn-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; /* Nút bấm nằm trên cùng */
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <button class="btn-play" onclick="playVideo()">Phát Video</button>

    <video id="myVideo" muted playsinline>
        <source src="output.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ định dạng WebM.
    </video>

    <script>
        function playVideo() {
            var video = document.getElementById("myVideo");
            var btn = document.querySelector(".btn-play");
            
            video.style.display = "block"; // Hiển thị video
            btn.style.display = "none";    // Ẩn nút bấm

            video.play().catch(error => {
                console.error("Lỗi phát video:", error);
                alert("Không thể phát video.");
            });
        }
    </script>
</body>
</html>
